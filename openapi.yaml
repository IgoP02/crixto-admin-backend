openapi: 3.1.0
info:
  title: Crixto Admin API
  version: 1.0.0
  description: OpenAPI document for the current auth, account, users, and passkey payloads.

servers:
  - url: http://192.168.100.114:3333
    description: Local API Server

tags:
  - name: System
  - name: Auth
  - name: Account
  - name: Users
  - name: Passkeys
  - name: CryptoAssets
  - name: Networks
  - name: Signers
  - name: Liquidity

paths:
  /:
    get:
      tags: [System]
      summary: Health check
      description: Returns a basic payload to verify the API is reachable.
      responses:
        '200':
          description: API is reachable
          content:
            application/json:
              schema:
                type: object
                required: [hello]
                properties:
                  hello:
                    type: string
                    example: world

  /docs/openapi.yaml:
    get:
      tags: [System]
      summary: Download OpenAPI document
      description: Returns the raw OpenAPI YAML file used by the API docs.
      responses:
        '200':
          description: OpenAPI YAML file
          content:
            application/yaml:
              schema:
                type: string

  /docs:
    get:
      tags: [System]
      summary: Swagger UI documentation
      description: Serves the Swagger UI HTML page.
      responses:
        '200':
          description: Swagger UI page
          content:
            text/html:
              schema:
                type: string

  /default-setup:
    post:
      tags: [System]
      summary: Bootstrap default super user
      description: Creates a super user when no super user exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Default super user created
          content:
            application/json:
              schema:
                type: object
                required: [email, password, user]
                properties:
                  email:
                    type: string
                    format: email
                  password:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Super user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/signup:
    post:
      tags: [Auth]
      summary: Self-sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: User created and API token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithTokenResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User authenticated and API token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithTokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current API token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/passkey/login/options:
    post:
      tags: [Passkeys]
      summary: Generate passkey login options
      description: Optionally scopes allowed credentials by email. Returns a flowId that must be echoed back to the verify endpoint.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginOptionsRequest'
      responses:
        '200':
          description: Flow created and WebAuthn request options returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyFlowResponse'

  /auth/passkey/login/verify:
    post:
      tags: [Passkeys]
      summary: Verify passkey login response
      description: Verifies passkey challenge and returns an API token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginVerifyRequest'
      responses:
        '200':
          description: Passkey verified and API token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithTokenResponse'

  /auth/passkey/register/options:
    post:
      tags: [Passkeys]
      summary: Generate passkey registration options
      description: Requires an authenticated API token. Returns a flowId that must be echoed back to the verify endpoint.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Flow created and WebAuthn creation options returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyFlowResponse'

  /auth/passkey/register/verify:
    post:
      tags: [Passkeys]
      summary: Verify passkey registration response
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegisterVerifyRequest'
      responses:
        '200':
          description: Passkey stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResponse'

  /account/profile:
    get:
      tags: [Account]
      summary: Get current authenticated profile
      x-permission: account.read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /users:
    post:
      tags: [Users]
      summary: Create a user as an authenticated user
      x-permission: users.create
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: User created and API token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithTokenResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /crypto_assets:
    get:
      tags: [CryptoAssets]
      summary: List crypto assets
      description: Relays upstream GET /crypto-assets endpoint.
      x-permission: crypto_assets.read
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Currency list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CryptoAssetIndexResponse'
                  - $ref: '#/components/schemas/PaginatedCryptoAssetResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

    post:
      tags: [CryptoAssets]
      summary: Create crypto asset
      description: Relays upstream POST /crypto-assets endpoint.
      x-permission: crypto_assets.create
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoAssetStoreRequest'
      responses:
        '201':
          description: Crypto asset created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CryptoAssetIndexResponse'
                  - $ref: '#/components/schemas/PaginatedCryptoAssetResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /crypto_assets/{id}:
    put:
      tags: [CryptoAssets]
      summary: Update crypto asset
      description: Relays upstream PUT /crypto-assets/:id endpoint.
      x-permission: crypto_assets.update
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoAssetUpdateRequest'
            example:
              symbol: LTC
              name: Litecoin
              baseUnitFactor: '1000000'
              coinType: 900
              platformFee: '10'
              networks:
                - multisigMinAmount: '1000000'
                  sweepThresholdAmount: '1000000'
                  id: 6
                  enabled: true
                  refillThresholdAmount: '20'
      responses:
        '200':
          description: Crypto asset updated
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CryptoAssetResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                id: 6
                symbol: LTC
                type: coin
                name: Litecoin
                coinType: 2
                baseUnitFactor: '1000000000000000000'
                platformFee: '100000000000000'
                createdAt: '2025-12-10T15:15:37.000+00:00'
                updatedAt: '2025-12-10T15:15:38.000+00:00'
                networks:
                  - id: 1
                    name: Ethereum Smart Chain
                    enabled: true
                    standard: ERC20
                    allowsTokens: true
                    createdAt: '2025-12-10T13:39:17.000+00:00'
                    updatedAt: '2025-12-10T13:39:18.000+00:00'
                    smartContractId: 1
                    asset_enabled: false
                    token_address: 0xdac17f958d2ee523a2206206994597c13d831ec7
                    sweep_threshold_amount: '1000000'
                    multisig_min_amount: '1000000'
                    refill_threshold_amount: '20'
                  - id: 6
                    name: Litecoin
                    enabled: false
                    standard: BTC
                    allowsTokens: false
                    createdAt: '2025-12-10T13:40:34.000+00:00'
                    updatedAt: '2026-04-17T14:08:17.755+00:00'
                    smartContractId: 0
                    asset_enabled: true
                    token_address: 0xdac17f958d2ee523a2206206994597c13d831ec7
                    sweep_threshold_amount: '1000000'
                    multisig_min_amount: '1000000'
                    refill_threshold_amount: '20'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /crypto_assets/movement-threshold/{networkId}/{cryptoAssetId}:
    put:
      tags: [CryptoAssets]
      summary: Update crypto asset movement thresholds
      description: Updates crypto asset movement thresholds by forwarding to upstream PUT /crypto-asset-thresholds/:networkId/:cryptoAssetId.
      x-permission: crypto_assets.update
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: networkId
          required: true
          schema:
            type: integer
        - in: path
          name: cryptoAssetId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoAssetMovementThresholdUpdateRequest'
      responses:
        '200':
          description: Crypto asset movement thresholds updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CryptoAssetMovementThresholdUpdateResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /networks:
    get:
      tags: [Networks]
      summary: List networks
      description: Relays upstream GET /networks endpoint.
      x-permission: networks.read
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Network list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NetworkIndexResponse'
                  - $ref: '#/components/schemas/PaginatedNetworkResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /networks/{id}/toggle-status:
    post:
      tags: [Networks]
      summary: Toggle network status
      description: Relays upstream POST /networks/:id/toggle-status endpoint.
      x-permission: networks.update
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Network disabled
          content:
            application/json:
              schema:
                type: 'null'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /networks/{id}/set-gas-warning-threshold:
    put:
      tags: [Networks]
      summary: Set gas warning threshold
      description: Sets the network gas warning threshold by forwarding to upstream PUT /networks/:id/set-gas-warning-threshold.
      x-permission: networks.update
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NetworkGasWarningThresholdUpdateRequest'
      responses:
        '200':
          description: Network gas warning threshold updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkGasWarningThresholdUpdateResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /signers:
    get:
      tags: [Signers]
      summary: List signers
      description: Relays upstream GET /signers endpoint.
      x-permission: signers.read
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Signer list response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SignerIndexResponse'
                  - $ref: '#/components/schemas/PaginatedSignerResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

    post:
      tags: [Signers]
      summary: Create signer
      description: Relays upstream POST /signers endpoint.
      x-permission: signers.create
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignerStoreRequest'
      responses:
        '201':
          description: Signer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signer'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /signers/{id}/disable:
    post:
      tags: [Signers]
      summary: Disable signer
      description: Relays upstream POST /signers/:id/disable endpoint.
      x-permission: signers.update
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Signer disabled
          content:
            application/json:
              schema:
                type: 'null'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

  /liquidity/snapshot:
    get:
      tags: [Liquidity]
      summary: Get current liquidity snapshot
      description: Relays upstream GET /liquidity/snapshot endpoint. Returns current gas balances, wallet information, and asset balances.
      x-permission: liquidity.read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current liquidity snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquiditySnapshotResponse'
        '403':
          $ref: '#/components/responses/AuthorizationFailure'

components:
  responses:
    AuthorizationFailure:
      description: Authenticated user does not have the required permission.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthorizationFailureResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  schemas:
    User:
      type: object
      required: [id, email, requiresPasskeyLogin, createdAt, initials]
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          nullable: true
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        requiresPasskeyLogin:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        initials:
          type: string
          example: JD

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'

    UserWithTokenResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: oAT2...token...

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Logged out successfully

    AuthorizationFailureResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: E_AUTHORIZATION_FAILURE
        message:
          type: string
          example: 'Missing permission: networks.update'

    VerificationResponse:
      type: object
      required: [verified]
      properties:
        verified:
          type: boolean

    CryptoAssetStoreNetworkRequest:
      type: object
      required:
        [enabled, allowsTokens, assetEnabled, tokenAddress, sweepThresholdAmount, refillThresholdAmount]
      properties:
        enabled:
          type: boolean
        allowsTokens:
          type: boolean
        assetEnabled:
          type: boolean
        tokenAddress:
          type: string
        sweepThresholdAmount:
          type: string
        multisigMinAmount:
          type: string
        refillThresholdAmount:
          type: string

    CryptoAssetStoreRequest:
      type: object
      required: [symbol, type, name, baseUnitFactor, platformFee, networks]
      properties:
        symbol:
          type: string
        type:
          type: string
        name:
          type: string
        baseUnitFactor:
          type: string
        platformFee:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/CryptoAssetStoreNetworkRequest'

    CryptoAssetUpdateNetworkRequest:
      type: object
      required: [id, sweepThresholdAmount, tokenAddress, refillThresholdAmount]
      properties:
        id:
          type: integer
        enabled:
          type: boolean
        sweepThresholdAmount:
          type: string
        multisigMinAmount:
          type: string
        refillThresholdAmount:
          type: string
        baseUnitFactor:
          type: string

    CryptoAssetUpdateRequest:
      type: object
      required: [symbol, name, networks]
      properties:
        symbol:
          type: string
        name:
          type: string
        networks:
          type: array
          items:
            $ref: '#/components/schemas/CryptoAssetUpdateNetworkRequest'

    CryptoAssetMovementThresholdUpdateRequest:
      type: object
      required:
        [accountDailyWithdrawLimit, accountsWithdrawMinFunds, accountsWithdrawMaxFunds]
      properties:
        accountDailyWithdrawLimit:
          type: string
          pattern: '^\\d+$'
          description: Daily withdrawal limit as a numeric string
        accountsWithdrawMinFunds:
          type: number
          minimum: 1
          maximum: 100
        accountsWithdrawMaxFunds:
          type: number
          minimum: 1
          maximum: 100

    CryptoAssetMovementThresholdUpdateResponse:
      type: object
      required:
        [accountDailyWithdrawLimit, accountsWithdrawMinFunds, accountsWithdrawMaxFunds]
      properties:
        accountDailyWithdrawLimit:
          type: number
        accountsWithdrawMinFunds:
          type: string
        accountsWithdrawMaxFunds:
          type: string

    CryptoAssetNetwork:
      type: object
      required:
        [id, name, enabled, standard, allowsTokens, asset_enabled, token_address, sweep_threshold_amount, refill_threshold_amount]
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          type: boolean
        standard:
          type: string
        allowsTokens:
          type: boolean
        asset_enabled:
          type: boolean
        token_address:
          type: string
        sweep_threshold_amount:
          type: string
        multisig_min_amount:
          type: string
          nullable: true
        refill_threshold_amount:
          type: string

    CryptoAssetResponse:
      type: object
      required:
        [id, symbol, type, name, coinType, baseUnitFactor, platformFee, createdAt, updatedAt, networks]
      properties:
        id:
          type: integer
        symbol:
          type: string
        type:
          type: string
        name:
          type: string
        coinType:
          type: integer
        baseUnitFactor:
          type: string
        platformFee:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        networks:
          type: array
          items:
            $ref: '#/components/schemas/CryptoAssetNetwork'

    CryptoAssetIndexResponse:
      type: array
      items:
        $ref: '#/components/schemas/CryptoAssetResponse'

    CryptoAssetInNetwork:
      type: object
      required: [id, name, symbol, asset_enabled, sweep_threshold_amount, refill_threshold_amount]
      properties:
        id:
          type: integer
        name:
          type: string
        symbol:
          type: string
        asset_enabled:
          type: boolean
        token_address:
          type: string
          nullable: true
        sweep_threshold_amount:
          type: string
        refill_threshold_amount:
          type: string

    Network:
      type: object
      required: [id, name, enabled, standard, allowsTokens, smartContractId, createdAt, updatedAt, cryptoAssets]
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          type: boolean
        standard:
          type: string
        allowsTokens:
          type: boolean
        smartContractId:
          type: integer
        gasWarningThreshold:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cryptoAssets:
          type: array
          items:
            $ref: '#/components/schemas/CryptoAssetInNetwork'

    NetworkIndexResponse:
      type: array
      items:
        $ref: '#/components/schemas/Network'

    NetworkGasWarningThresholdUpdateRequest:
      type: object
      required: [threshold]
      properties:
        threshold:
          type: string
          pattern: '^\d+$'
          description: Gas warning threshold as a numeric string.

    NetworkGasWarningThresholdUpdateResponse:
      type: object
      required: [id, gasWarningThreshold]
      properties:
        id:
          type: integer
        gasWarningThreshold:
          type: string

    Signer:
      type: object
      required: [id, uuid, host, enabled, description, type, isMonoSigner, createdAt, updatedAt, isReady]
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        host:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        type:
          type: string
        isMonoSigner:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isReady:
          type: boolean

    SignerIndexResponse:
      type: array
      items:
        $ref: '#/components/schemas/Signer'

    SignerStoreRequest:
      type: object
      required: [host, description, type]
      properties:
        host:
          type: string
        description:
          type: string
        type:
          type: string

    PaginatedCryptoAssetResponse:
      type: object
      required: [total, perPage, lastPage, firstPage, data]
      properties:
        total:
          type: integer
        perPage:
          type: integer
        lastPage:
          type: integer
        firstPage:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/CryptoAssetResponse'

    PaginatedNetworkResponse:
      type: object
      required: [total, perPage, lastPage, firstPage, data]
      properties:
        total:
          type: integer
        perPage:
          type: integer
        lastPage:
          type: integer
        firstPage:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Network'

    PaginatedSignerResponse:
      type: object
      required: [total, perPage, lastPage, firstPage, data]
      properties:
        total:
          type: integer
        perPage:
          type: integer
        lastPage:
          type: integer
        firstPage:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Signer'

    SignupRequest:
      type: object
      required: [email, password, passwordConfirmation]
      properties:
        fullName:
          type: string
          nullable: true
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 8
          maxLength: 32
          format: password
        passwordConfirmation:
          type: string
          minLength: 8
          maxLength: 32
          format: password
        requiresPasskeyLogin:
          type: boolean
          default: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password

    PasskeyLoginOptionsRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Optional. When provided, limits allowed credentials to that user's passkeys.

    PasskeyFlowResponse:
      type: object
      required: [flowId, options]
      properties:
        flowId:
          type: string
          format: uuid
        options:
          type: object
          description: SimpleWebAuthn-generated options JSON returned by the server.
          additionalProperties: true

    PasskeyRegisterVerifyRequest:
      allOf:
        - type: object
          required: [flowId]
          properties:
            flowId:
              type: string
              format: uuid
        - $ref: '#/components/schemas/WebAuthnRegistrationResponseJSON'

    PasskeyLoginVerifyRequest:
      allOf:
        - type: object
          required: [flowId]
          properties:
            flowId:
              type: string
              format: uuid
        - $ref: '#/components/schemas/WebAuthnAuthenticationResponseJSON'

    WebAuthnRegistrationResponseJSON:
      type: object
      required: [id, rawId, response, clientExtensionResults, type]
      properties:
        id:
          type: string
        rawId:
          type: string
        type:
          type: string
          enum: [public-key]
        authenticatorAttachment:
          type: string
          nullable: true
        clientExtensionResults:
          type: object
          additionalProperties: true
        response:
          type: object
          required: [clientDataJSON, attestationObject]
          properties:
            clientDataJSON:
              type: string
            attestationObject:
              type: string
            transports:
              type: array
              items:
                type: string
            publicKeyAlgorithm:
              type: integer
            publicKey:
              type: string

    WebAuthnAuthenticationResponseJSON:
      type: object
      required: [id, rawId, response, clientExtensionResults, type]
      properties:
        id:
          type: string
        rawId:
          type: string
        type:
          type: string
          enum: [public-key]
        authenticatorAttachment:
          type: string
          nullable: true
        clientExtensionResults:
          type: object
          additionalProperties: true
        response:
          type: object
          required: [clientDataJSON, authenticatorData, signature]
          properties:
            clientDataJSON:
              type: string
            authenticatorData:
              type: string
            signature:
              type: string
            userHandle:
              type: string
              nullable: true

    LiquidityThreshold:
      type: object
      required: [accountDailyWitdrawLimit, accountWithdrawMinFunds, accountWithdrawMaxFunds]
      properties:
        accountDailyWitdrawLimit:
          type: string
          description: Daily withdrawal limit for the account
        accountWithdrawMinFunds:
          type: number
          description: Minimum funds required for withdrawal
        accountWithdrawMaxFunds:
          type: number
          description: Maximum funds allowed for withdrawal

    LiquidityGasItem:
      type: object
      required: [networkId, description, coinName, gasAddress, gasBalance]
      properties:
        networkId:
          type: integer
          description: Network identifier
        description:
          type: string
          description: Description of the gas wallet
        coinName:
          type: string
          description: Name of the gas coin
        gasAddress:
          type: string
          description: Address of the gas wallet
        gasBalance:
          type: string
          description: Current balance in the gas wallet

    LiquidityWalletBalanceItem:
      type: object
      required: [assetId, assetName, assetType, balance, address, thresholds]
      properties:
        assetId:
          type: integer
          description: Identifier of the crypto asset
        assetName:
          type: string
          description: Name of the crypto asset
        assetType:
          type: string
          description: Type of the crypto asset
        balance:
          type: string
          description: Current balance of the asset in the wallet
        address:
          type: string
          description: Wallet address holding the asset
        thresholds:
          $ref: '#/components/schemas/LiquidityThreshold'

    LiquidityWalletItem:
      type: object
      required: [walletId, walletUuid, walletProxyContract, type, enabled, networkId, networkName, networkEnabled, balances]
      properties:
        walletId:
          type: integer
          description: Identifier of the wallet
        walletUuid:
          type: string
          format: uuid
          description: UUID of the wallet
        walletProxyContract:
          type: string
          description: Address of the proxy contract for the wallet
        type:
          type: string
          description: Type of wallet (e.g., 'hot', 'cold')
        enabled:
          type: boolean
          description: Whether the wallet is enabled
        networkId:
          type: integer
          description: Network on which the wallet operates
        networkName:
          type: string
          description: Name of the network
        networkEnabled:
          type: boolean
          description: Whether the network is enabled
        balances:
          type: array
          items:
            $ref: '#/components/schemas/LiquidityWalletBalanceItem'

    LiquidityBalanceItem:
      type: object
      required: [networkId, networkName, cryptoAssetId, cryptoAssetname, cryptoAssetType, balance, balanceOut, balanceCold, thresholds]
      properties:
        networkId:
          type: integer
          description: Network identifier
        networkName:
          type: string
          description: Name of the network
        cryptoAssetId:
          type: integer
          description: Identifier of the crypto asset
        cryptoAssetname:
          type: string
          description: Name of the crypto asset
        cryptoAssetType:
          type: string
          description: Type of the crypto asset
        balance:
          type: string
          description: Total balance of the asset
        balanceOut:
          type: string
          description: Balance currently out (in cold storage or awaiting settlement)
        balanceCold:
          type: string
          description: Balance in cold storage
        thresholds:
          $ref: '#/components/schemas/LiquidityThreshold'

    LiquiditySnapshotResponse:
      type: object
      required: [gas, wallets, balances]
      properties:
        gas:
          type: array
          description: List of gas wallet balances across networks
          items:
            $ref: '#/components/schemas/LiquidityGasItem'
        wallets:
          type: array
          description: List of managed wallets with their balances
          items:
            $ref: '#/components/schemas/LiquidityWalletItem'
        balances:
          type: array
          description: Aggregated balance information per network and asset
          items:
            $ref: '#/components/schemas/LiquidityBalanceItem'